name: Update UI Screenshot

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-ui-screenshot:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure
        run: cmake -S . -B build -DPENTAGON_BUILD_TESTS=ON

      - name: Build screenshot renderer
        run: cmake --build build --target PentagonUIScreenshot --parallel 3

      - name: Render UI screenshot
        run: ./build/PentagonUIScreenshot_artefacts/PentagonUIScreenshot docs/pentagon-ui.png

      - name: Commit screenshot
        run: |
          if git diff --quiet -- README.md docs/pentagon-ui.png; then
            echo "UI screenshot unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/pentagon-ui.png
          git commit -m "Update UI screenshot"
          git push
