name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-vst3:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            pkg-config \
            zip \
            libasound2-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libcurl4-openssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Pentagon VST3
        shell: bash
        run: |
          jobs=$(( $(nproc) / 2 ))
          if [ "$jobs" -lt 1 ]; then
            jobs=1
          fi
          cmake --build build --config Release -j"$jobs"

      - name: Package Linux VST3 bundle
        shell: bash
        run: |
          mkdir -p dist
          plugin_bundle="$(find build -type d -name 'Pentagon.vst3' | head -n 1)"
          if [ -z "$plugin_bundle" ]; then
            echo "Pentagon.vst3 bundle was not found under build/"
            find build -maxdepth 4 \( -type d -o -type f \) | sort
            exit 1
          fi
          stage_dir="$(mktemp -d)"
          cp -R "$plugin_bundle" "$stage_dir/Pentagon.vst3"
          (
            cd "$stage_dir"
            zip -r "$GITHUB_WORKSPACE/dist/Pentagon-linux-${GITHUB_REF_NAME}.zip" Pentagon.vst3
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pentagon-linux-${{ github.ref_name }}
          path: dist/Pentagon-linux-${{ github.ref_name }}.zip

      - name: Publish tagged release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/Pentagon-linux-${{ github.ref_name }}.zip
