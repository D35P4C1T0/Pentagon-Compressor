name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-vst3:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            pkg-config \
            zip \
            libasound2-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libcurl4-openssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Pentagon VST3
        shell: bash
        run: |
          jobs=$(( $(nproc) / 2 ))
          if [ "$jobs" -lt 1 ]; then
            jobs=1
          fi
          cmake --build build --config Release -j"$jobs"

      - name: Package Linux VST3 bundle
        shell: bash
        run: |
          mkdir -p dist
          cp -R build/Pentagon_artefacts/VST3/Pentagon.vst3 dist/Pentagon.vst3
          cd dist
          zip -r "Pentagon-linux-${GITHUB_REF_NAME}.zip" Pentagon.vst3

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pentagon-linux-${{ github.ref_name }}
          path: dist/Pentagon-linux-${{ github.ref_name }}.zip

      - name: Publish tagged release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/Pentagon-linux-${{ github.ref_name }}.zip
