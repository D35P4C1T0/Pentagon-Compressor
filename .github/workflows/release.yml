name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-vst3:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            pkg-config \
            zip \
            libasound2-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libcurl4-openssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Pentagon VST3
        shell: bash
        run: |
          jobs=$(( $(nproc) / 2 ))
          if [ "$jobs" -lt 1 ]; then
            jobs=1
          fi
          cmake --build build --config Release -j"$jobs"

      - name: Package Linux VST3 bundle
        shell: bash
        run: |
          mkdir -p dist
          plugin_bundle="$(find build -type d -name 'Pentagon.vst3' | head -n 1)"
          if [ -z "$plugin_bundle" ]; then
            echo "Pentagon.vst3 bundle was not found under build/"
            find build -maxdepth 4 \( -type d -o -type f \) | sort
            exit 1
          fi
          stage_dir="$(mktemp -d)"
          cp -R "$plugin_bundle" "$stage_dir/Pentagon.vst3"
          (
            cd "$stage_dir"
            zip -r "$GITHUB_WORKSPACE/dist/Pentagon-linux-${GITHUB_REF_NAME}.zip" Pentagon.vst3
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pentagon-linux-${{ github.ref_name }}
          path: dist/Pentagon-linux-${{ github.ref_name }}.zip

  build-macos-vst3:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Pentagon VST3
        shell: bash
        run: |
          jobs=$(( $(sysctl -n hw.ncpu) / 2 ))
          if [ "$jobs" -lt 1 ]; then
            jobs=1
          fi
          cmake --build build --config Release -j"$jobs"

      - name: Package macOS VST3 bundle
        shell: bash
        run: |
          mkdir -p dist
          plugin_bundle="$(find build -type d -name 'Pentagon.vst3' | head -n 1)"
          if [ -z "$plugin_bundle" ]; then
            echo "Pentagon.vst3 bundle was not found under build/"
            find build -maxdepth 5 \( -type d -o -type f \) | sort
            exit 1
          fi
          stage_dir="$(mktemp -d)"
          cp -R "$plugin_bundle" "$stage_dir/Pentagon.vst3"
          ditto -c -k --sequesterRsrc --keepParent \
            "$stage_dir/Pentagon.vst3" \
            "$GITHUB_WORKSPACE/dist/Pentagon-macos-${GITHUB_REF_NAME}.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pentagon-macos-${{ github.ref_name }}
          path: dist/Pentagon-macos-${{ github.ref_name }}.zip

  build-windows-vst3:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build Pentagon VST3
        shell: pwsh
        run: |
          $jobs = [Math]::Max([int]([Environment]::ProcessorCount / 2), 1)
          cmake --build build --config Release --parallel $jobs

      - name: Package Windows VST3 bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $pluginBundle = Get-ChildItem -Path build -Recurse -Directory -Filter Pentagon.vst3 | Select-Object -First 1
          if (-not $pluginBundle) {
            Write-Host "Pentagon.vst3 bundle was not found under build/"
            Get-ChildItem -Path build -Recurse | Select-Object FullName
            exit 1
          }

          $stageDir = Join-Path $env:RUNNER_TEMP "pentagon-vst3"
          if (Test-Path $stageDir) {
            Remove-Item -Recurse -Force $stageDir
          }
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item -Recurse -Path $pluginBundle.FullName -Destination (Join-Path $stageDir "Pentagon.vst3")
          Compress-Archive -Path (Join-Path $stageDir "Pentagon.vst3") -DestinationPath ("dist/Pentagon-windows-{0}.zip" -f $env:GITHUB_REF_NAME) -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pentagon-windows-${{ github.ref_name }}
          path: dist/Pentagon-windows-${{ github.ref_name }}.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux-vst3
      - build-macos-vst3
      - build-windows-vst3
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish tagged release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/Pentagon-linux-${{ github.ref_name }}/Pentagon-linux-${{ github.ref_name }}.zip
            dist/Pentagon-macos-${{ github.ref_name }}/Pentagon-macos-${{ github.ref_name }}.zip
            dist/Pentagon-windows-${{ github.ref_name }}/Pentagon-windows-${{ github.ref_name }}.zip
